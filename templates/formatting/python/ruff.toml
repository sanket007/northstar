# Strong, opinionated Ruff config — one fast tool for both linting and formatting
# (replaces black + isort + flake8 + pyupgrade). Installed by `northstar project add`.
line-length = 100
target-version = "py311"

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort (import ordering)
  "N",   # pep8-naming
  "UP",  # pyupgrade (modern syntax)
  "B",   # flake8-bugbear (likely bugs)
  "C4",  # flake8-comprehensions
  "SIM", # flake8-simplify
  "RUF", # ruff-specific rules
]
# line length is enforced by the formatter, not the linter
ignore = ["E501"]

[lint.per-file-ignores]
"tests/**" = ["N802", "N803"]  # test function/arg names may be unconventional

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false
