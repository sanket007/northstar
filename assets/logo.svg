<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="northstar logo">
  <title>northstar</title>
  <defs>
    <linearGradient id="ns-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- orchestration loop: the autonomous build to merge cycle -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="url(#ns-grad)" stroke-width="2" opacity="0.45"/>
  <!-- pipeline stages on the loop: build, review, QA, merge -->
  <circle cx="102" cy="26" r="5" fill="#22D3EE"/>
  <circle cx="102" cy="102" r="5" fill="url(#ns-grad)" opacity="0.7"/>
  <circle cx="26" cy="102" r="5" fill="url(#ns-grad)" opacity="0.7"/>
  <circle cx="26" cy="26" r="5" fill="url(#ns-grad)" opacity="0.7"/>
  <!-- the guiding north star at the center -->
  <polygon points="64,18 76,52 100,64 76,76 64,110 52,76 28,64 52,52" fill="url(#ns-grad)"/>
</svg>
