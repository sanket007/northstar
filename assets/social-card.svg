<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="northstar social card">
  <title>northstar</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111B30"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="640" cy="226" r="280" fill="url(#glow)"/>

  <!-- mark: north star + orchestration loop, scaled 1.6x and centred at (640, 226) -->
  <g transform="translate(537.6,123.6) scale(1.6)">
    <circle cx="64" cy="64" r="54" fill="none" stroke="url(#mark)" stroke-width="2" opacity="0.5"/>
    <circle cx="102" cy="26" r="5" fill="#22D3EE"/>
    <circle cx="102" cy="102" r="5" fill="url(#mark)" opacity="0.75"/>
    <circle cx="26" cy="102" r="5" fill="url(#mark)" opacity="0.75"/>
    <circle cx="26" cy="26" r="5" fill="url(#mark)" opacity="0.75"/>
    <polygon points="64,18 76,52 100,64 76,76 64,110 52,76 28,64 52,52" fill="url(#mark)"/>
  </g>

  <text x="640" y="430" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="116" font-weight="700" letter-spacing="-3" fill="#F8FAFC">northstar</text>

  <text x="640" y="492" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="31" font-weight="500" letter-spacing="0.5" fill="#9FB3C8">Autonomous build &#8594; review &#8594; QA &#8594; merge, driven by real Claude Code sessions</text>

  <text x="640" y="556" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="600" letter-spacing="3" fill="#22D3EE">PLANE&#160;&#160;&#183;&#160;&#160;CLAUDE&#160;CODE&#160;&#160;&#183;&#160;&#160;GITHUB</text>
</svg>
