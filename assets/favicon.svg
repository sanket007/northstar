<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="northstar icon">
  <title>northstar</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1A30"/>
      <stop offset="1" stop-color="#13233F"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- app-icon style: rounded dark tile + bold star (legible down to 16px) -->
  <rect x="2" y="2" width="124" height="124" rx="28" fill="url(#bg)"/>
  <polygon points="64,12 79,49 116,64 79,79 64,116 49,79 12,64 49,49" fill="url(#star)"/>
</svg>
